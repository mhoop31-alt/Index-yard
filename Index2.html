<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yard Inventory Pro</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 15px; margin: 0; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 12px; border-left: 6px solid #ffaa00; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #ffaa00; font-size: 1.5rem; }
        
        /* Three-Way Toggle */
        .type-toggle { display: flex; gap: 8px; margin-bottom: 15px; }
        .type-btn { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; background: #444; color: white; font-weight: bold; font-size: 0.9rem; }
        .type-btn.active { background: #ffaa00; color: black; }

        input[type="text"] { width: 100%; padding: 15px; margin: 8px 0; background: #333; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; font-size: 1.1rem; }
        #searchInput { border-color: #00ff88; margin-bottom: 15px; }

        /* Perfect Alignment & Large Tap Targets */
        .parts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .part-item { display: flex; align-items: center; gap: 12px; font-size: 1.25rem; font-weight: 500; padding: 8px 0; }
        input[type="checkbox"] { width: 26px; height: 26px; margin: 0; cursor: pointer; accent-color: #ffaa00; }

        button.log-btn { background: #ffaa00; color: #000; border: none; padding: 18px; width: 100%; font-weight: bold; font-size: 1.2rem; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        
        .inventory-item { background: #333; padding: 15px; border-radius: 8px; margin-top: 10px; border-bottom: 1px solid #444; }
        .delete-btn { background: #ff4444; color: white; padding: 8px 12px; border-radius: 5px; float: right; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Vehicle Intake</h2>
    <div class="type-toggle">
        <button id="truckBtn" class="type-btn active" onclick="setType('truck')">Truck</button>
        <button id="carBtn" class="type-btn" onclick="setType('car')">Car</button>
        <button id="bikeBtn" class="type-btn" onclick="setType('bike')">Motorcycle</button>
    </div>
    <input type="text" id="vName" placeholder="Year Make Model">
    <div class="parts-grid" id="partsContainer"></div>
    <button class="log-btn" onclick="saveToLog()">Log Vehicle</button>
</div>

<div class="card" style="border-left-color: #00ff88;">
    <h2>Current Inventory</h2>
    <input type="text" id="searchInput" placeholder="Search name or part..." oninput="displayInventory()">
    <div id="inventoryDisplay"></div>
</div>

<script>
    // Distinct Parts Lists
    const truckParts = ["Engine", "Transmission", "Rear End", "Transfer Case", "ECM", "Tailgate", "Bed/Box", "Seats", "Radiator", "Wheels"];
    const carParts = ["Engine", "Transmission", "Catalytic", "ECM", "Doors", "Hood", "Trunk Lid", "Seats", "Radiator", "Wheels"];
    const bikeParts = ["Engine", "Front Forks", "Gas Tank", "Electronics/CDI", "Wheels"];
    
    let currentType = 'truck';

    function renderParts() {
        const container = document.getElementById('partsContainer');
        container.innerHTML = "";
        let list = (currentType === 'truck') ? truckParts : (currentType === 'car' ? carParts : bikeParts);
        
        list.forEach(part => {
            container.innerHTML += `
                <div class="part-item">
                    <input type="checkbox" class="part-check" value="${part}">
                    <span>${part}</span>
                </div>`;
        });
    }

    function setType(type) {
        currentType = type;
        document.getElementById('truckBtn').classList.toggle('active', type === 'truck');
        document.getElementById('carBtn').classList.toggle('active', type === 'car');
        document.getElementById('bikeBtn').classList.toggle('active', type === 'bike');
        renderParts();
    }

    function saveToLog() {
        const nameInput = document.getElementById('vName');
        if (!nameInput.value) return alert("Enter vehicle info!");

        const checkedParts = [];
        document.querySelectorAll('.part-check:checked').forEach(box => {
            checkedParts.push(box.value);
        });

        const newVehicle = {
            id: Date.now(),
            name: `${currentType.toUpperCase()}: ${nameInput.value}`,
            parts: checkedParts
        };

        const inventory = JSON.parse(localStorage.getItem('myYard') || '[]');
        inventory.push(newVehicle);
        localStorage.setItem('myYard', JSON.stringify(inventory));

        nameInput.value = '';
        displayInventory();
    }

    function displayInventory() {
        const display = document.getElementById('inventoryDisplay');
        const searchTxt = document.getElementById('searchInput').value.toLowerCase();
        let inventory = JSON.parse(localStorage.getItem('myYard') || '[]');
        
        if (searchTxt) {
            inventory = inventory.filter(v => 
                v.name.toLowerCase().includes(searchTxt) || 
                v.parts.some(p => p.toLowerCase().includes(searchTxt))
            );
        }

        display.innerHTML = inventory.length === 0 ? "<p style='color:#888'>No matching vehicles.</p>" : "";
        inventory.slice().reverse().forEach(v => {
            const item = document.createElement('div');
            item.className = 'inventory-item';
            item.innerHTML = `
                <button class="delete-btn" onclick="deleteVehicle(${v.id})">Remove</button>
                <strong style="color:#ffaa00; font-size:1.15rem;">${v.name}</strong><br>
                <div style="margin-top:5px; color:#bbb; font-size:1rem;">
                    Parts: ${v.parts.join(', ') || 'None selected'}
                </div>
            `;
            display.appendChild(item);
        });
    }

    function deleteVehicle(id) {
        if(!confirm("Remove this vehicle?")) return;
        let inventory = JSON.parse(localStorage.getItem('myYard') || '[]');
        inventory = inventory.filter(v => v.id !== id);
        localStorage.setItem('myYard', JSON.stringify(inventory));
        displayInventory();
    }

    renderParts();
    displayInventory();
</script>
</body>
</html>
